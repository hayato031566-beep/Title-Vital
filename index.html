<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Twist - eBay Title Booster</title>
    <style>
        :root { --primary: #0070f3; --bg: #fafafa; --text: #111; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: #666; margin-bottom: 2rem; }
        input { width: 100%; padding: 12px 16px; margin-bottom: 1rem; border: 1px solid #eaeaea; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #f0f0f0; border-radius: 8px; min-height: 40px; font-weight: 500; word-break: break-all; }
        .disclaimer { font-size: 11px; color: #999; margin-top: 2rem; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌪️ List Twist</h1>
        <p>Lightning-fast eBay Title Optimizer</p>
        
        <input type="text" id="userInput" placeholder="Paste your simple title here...">
        <button onclick="boost()">Boost Title ⚡</button>

        <div id="result">Result will appear here...</div>

        <div class="disclaimer">
            <b>Disclaimer:</b> Suggestions only. Check eBay policies and verify title accuracy before listing. We are not responsible for any listing disputes.
        </div>
    </div>

    <script>
        async function boost() {
            const input = document.getElementById('userInput').value;
            const resBox = document.getElementById('result');
            if (!input) return alert("Please enter a title!");

            resBox.innerText = "Twisting... 🌀";

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input })
                });
                const data = await res.json();
                resBox.innerText = data.output || "Error. Try again.";
            } catch (e) {
                resBox.innerText = "Connection Error.";
            }
        }
    </script>
</body>
</html>
